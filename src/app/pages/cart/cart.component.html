<div class="cart-container">
  <h2 *ngIf="cartData.length > 0" style="font-weight: 500; margin-top: 120px">Shopping Cart </h2>
  <div style="display: flex" class="small-container cart-page">
    <table *ngIf="cartData.length > 0; else elseBlock"style="background-color: white" >
      <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Subtotal</th>
      </tr>
      <br />
      <tr *ngFor="let data of cartData; let i = index">
        <td>
          <div class="cart-info">
            <img src="{{ data.image }}" alt="" />
            <div>
              <p class="item-name" style="margin-bottom: 5px">{{ data.name }}</p>
              <small>Price: ${{ data.price }}</small>
              <br />
              <!-- <a href="">Remove</a> -->
              <p style="margin-top: 27px">
                <fa-icon [icon]="deleteIcon"class="cart-icon"(click)="deleteItem(i)" ></fa-icon>
              </p>
            </div>
          </div>
        </td>
        <td>
          <input [(ngModel)]="data.quantity"type="number" min="1" (input)="inputChanged()"onkeydown="return false" />
        </td>
        <td style="padding-right: 20px" class="item-price"> ${{ data.price * data.quantity }}</td>
      </tr>
    </table>
    <ng-template #elseBlock>
      <div class="empty-cart">
        <h2>Your Cart is empty</h2>
        <button routerLink="/shop" class="empty-cart-btn">Shop Now</button>
      </div>
    </ng-template>

    <div *ngIf="cartData.length > 0">
      <div style="background-color: white" class="cart-summary">
        <span style="text-align: start" class="subtotal">Subtotal ({{ totalQuantity }} {{ singleOrPluralItem }}): ${{ totalPrice}}</span>
        <button (click)="orderPlaced()" class="place-order-btn">Place an Order</button>
      </div>
    </div>
  </div>
  <hr *ngIf="cartData.length > 0" style="width: 891px" />

  <div *ngIf="cartData.length > 0" class="total-price">
    <table>
      <tr>
        <td class="subtotal"> Subtotal ({{ totalQuantity }} {{ singleOrPluralItem }}): ${{totalPrice}}
        </td>
      </tr>
    </table>
  </div>
</div>
